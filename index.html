<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工时记录 · 薪资试算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── 设计令牌 ─────────────────────────────────── */
:root {
  --ink:       #1a1814;
  --ink2:      #4a4640;
  --ink3:      #8a8680;
  --paper:     #f7f5f0;
  --paper2:    #edeae3;
  --paper3:    #e0ddd5;
  --accent:    #c8410a;
  --accent2:   #e85d20;
  --green:     #2a7a4a;
  --green-bg:  #e8f5ee;
  --red-bg:    #fdf0ec;
  --border:    #d4d0c8;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
  --radius:    10px;
  --font-serif: 'Noto Serif SC', serif;
  --font-mono:  'DM Mono', monospace;
  --font-sans:  'Inter', sans-serif;
}

/* ─── Reset ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.6;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* ─── 认证页 ─────────────────────────────────── */
#auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 44px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
}
.auth-logo {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -.3px;
}
.auth-logo span { color: var(--accent); }
.auth-sub {
  font-size: 13px;
  color: var(--ink3);
  margin-bottom: 32px;
}
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  gap: 0;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  color: var(--ink3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  transition: all .2s;
}
.auth-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 500;
}
.field-group { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  margin-bottom: 6px;
  letter-spacing: .3px;
  text-transform: uppercase;
}
.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--ink);
  background: var(--paper);
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,65,10,.1);
  background: white;
}
.btn-primary {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .3px;
  transition: background .2s, transform .1s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.auth-error {
  font-size: 13px;
  color: var(--accent);
  margin-top: 12px;
  text-align: center;
  min-height: 20px;
}

/* ─── 主布局 ─────────────────────────────────── */
#app { display: none; min-height: 100vh; }

/* Sidebar */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 220px;
  background: var(--ink);
  display: flex;
  flex-direction: column;
  padding: 28px 0;
  z-index: 100;
}
.sidebar-logo {
  font-family: var(--font-serif);
  font-size: 17px;
  color: white;
  padding: 0 24px 28px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 16px;
  letter-spacing: -.3px;
}
.sidebar-logo span { color: var(--accent2); }
.sidebar-nav { flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  font-size: 14px;
  color: rgba(255,255,255,.5);
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  transition: all .15s;
  cursor: pointer;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: rgba(255,255,255,.85); background: rgba(255,255,255,.04); }
.nav-item.active {
  color: white;
  background: rgba(255,255,255,.07);
  border-left-color: var(--accent2);
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.user-info {
  font-size: 12px;
  color: rgba(255,255,255,.4);
  margin-bottom: 10px;
}
.user-name { color: rgba(255,255,255,.8); font-weight: 500; font-size: 13px; }
.btn-logout {
  font-size: 12px;
  color: rgba(255,255,255,.35);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: color .2s;
}
.btn-logout:hover { color: rgba(255,255,255,.7); }

/* Main content */
.main {
  margin-left: 220px;
  padding: 32px 36px;
  max-width: 1100px;
}

/* ─── 通用组件 ────────────────────────────────── */
.page-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 28px;
}
.page-title {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -.5px;
}
.page-title span { color: var(--accent); }
.page-sub { font-size: 13px; color: var(--ink3); margin-top: 2px; }

.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.card-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--paper2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 500; color: var(--ink); }
.card-body { padding: 22px; }

.btn {
  padding: 8px 18px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: var(--accent2); }
.btn-ghost {
  background: var(--paper2);
  color: var(--ink2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--paper3); }
.btn-danger { background: var(--red-bg); color: var(--accent); border: 1px solid #f0c4b5; }
.btn-danger:hover { background: #fae0d8; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Badge */
.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
}
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-orange { background: #fff3e8; color: #c05800; }
.badge-gray { background: var(--paper2); color: var(--ink3); }

/* ─── 工时记录页 ──────────────────────────────── */
#page-timesheet { display: none; }

.month-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.month-nav button {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: white;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.month-nav button:hover { background: var(--paper2); }
.month-display {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 500;
  min-width: 90px;
  text-align: center;
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.stat-label { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: .5px; }
.stat-value {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 500;
  margin-top: 4px;
  color: var(--ink);
}
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 2px solid var(--paper2); }
th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
}
td {
  padding: 13px 14px;
  border-bottom: 1px solid var(--paper);
  font-size: 13px;
  color: var(--ink);
}
.date-col { font-family: var(--font-mono); font-size: 12px; }
.time-col { font-family: var(--font-mono); color: var(--ink2); }
.hours-col { font-family: var(--font-mono); font-weight: 500; }
tr:hover td { background: var(--paper); }
.empty-row td {
  text-align: center;
  color: var(--ink3);
  padding: 40px;
  font-size: 14px;
}

/* ─── 模态框 ─────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: white;
  border-radius: 14px;
  width: 100%;
  max-width: 500px;
  box-shadow: var(--shadow-lg);
  transform: translateY(8px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--paper2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 600; font-family: var(--font-serif); }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--paper2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.modal-close:hover { background: var(--paper3); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--paper2);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-field { margin-bottom: 16px; }
.form-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.form-field input, .form-field select, .form-field textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 14px;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,65,10,.1);
  background: white;
}
.form-field textarea { resize: vertical; min-height: 72px; }

/* ─── 薪资试算页 ──────────────────────────────── */
#page-salary { display: none; }

.salary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

.salary-result {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.salary-result-header {
  background: var(--ink);
  padding: 20px 24px;
  color: white;
}
.salary-result-label { font-size: 11px; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.salary-net {
  font-family: var(--font-mono);
  font-size: 36px;
  font-weight: 500;
  color: white;
}
.salary-net span { font-size: 18px; }

.salary-breakdown { padding: 20px 24px; }
.breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--paper);
  font-size: 13px;
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-label { color: var(--ink2); }
.breakdown-value {
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--ink);
}
.breakdown-value.deduct { color: var(--accent); }
.breakdown-value.gross { color: var(--green); }
.breakdown-section {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 14px 0 6px;
  border-bottom: 2px solid var(--paper2);
  display: flex;
  justify-content: space-between;
}

/* 社保配置折叠 */
.si-config { margin-top: 16px; }
.si-toggle {
  font-size: 12px;
  color: var(--ink3);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color .2s;
}
.si-toggle:hover { color: var(--ink2); }
.si-rates {
  display: none;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
  padding: 16px;
  background: var(--paper);
  border-radius: 8px;
}
.si-rates.open { display: grid; }

/* 自定义扣款 */
.custom-deductions { margin-top: 4px; }
.deduction-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.deduction-item input { flex: 1; }
.deduction-item input:nth-child(2) { flex: 0 0 120px; }
.btn-add-deduction {
  font-size: 12px;
  color: var(--accent);
  background: none;
  border: 1px dashed var(--accent);
  border-radius: 6px;
  padding: 6px 12px;
  width: 100%;
  cursor: pointer;
  transition: background .15s;
}
.btn-add-deduction:hover { background: var(--red-bg); }

/* ─── 月度汇总页 ──────────────────────────────── */
#page-summary { display: none; }

.summary-chart { height: 200px; position: relative; overflow: hidden; }
.bar-chart {
  display: flex;
  align-items: flex-end;
  height: 160px;
  gap: 8px;
  padding: 0 8px;
}
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar {
  width: 100%;
  border-radius: 4px 4px 0 0;
  background: var(--accent);
  opacity: .85;
  transition: height .4s ease, opacity .2s;
  min-height: 2px;
}
.bar:hover { opacity: 1; }
.bar-label { font-size: 10px; color: var(--ink3); font-family: var(--font-mono); }

/* ─── 响应式 ─────────────────────────────────── */
@media (max-width: 900px) {
  .sidebar { width: 64px; padding: 20px 0; }
  .sidebar-logo, .nav-item span, .user-info, .user-name, .btn-logout { display: none; }
  .nav-item { justify-content: center; padding: 14px; border-left: none; border-radius: 0; }
  .nav-item.active { background: rgba(255,255,255,.1); }
  .main { margin-left: 64px; padding: 24px 20px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .salary-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}

/* ─── 加载指示 ───────────────────────────────── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--ink3);
  font-size: 13px;
  gap: 10px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--paper3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Toast ─────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--ink);
  color: white;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  transform: translateY(80px);
  opacity: 0;
  transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--green); }
.toast.error { background: var(--accent); }
</style>
</head>
<body>

<!-- ─── 认证页 ─────────────────────────────────── -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">工时<span>·</span>薪算</div>
    <div class="auth-sub">工时记录 & 到手工资试算工具</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="form-login">
      <div class="field-group">
        <div class="field"><label>邮箱</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>密码</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"></div>
      </div>
      <button class="btn-primary" id="btn-login" onclick="handleLogin()">登录</button>
      <div class="auth-error" id="auth-error"></div>
    </div>

    <!-- 注册表单 -->
    <div id="form-register" style="display:none">
      <div class="field-group">
        <div class="field"><label>姓名</label><input type="text" id="reg-name" placeholder="张三"></div>
        <div class="field"><label>邮箱</label><input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>密码</label><input type="password" id="reg-password" placeholder="至少 6 位" autocomplete="new-password"></div>
      </div>
      <button class="btn-primary" id="btn-register" onclick="handleRegister()">创建账号</button>
      <div class="auth-error" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- ─── 主应用 ─────────────────────────────────── -->
<div id="app">
  <!-- 侧边栏 -->
  <nav class="sidebar">
    <div class="sidebar-logo">工时<span>·</span>薪算</div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="showPage('timesheet')">
        <span class="nav-icon">📋</span><span>工时记录</span>
      </button>
      <button class="nav-item" onclick="showPage('salary')">
        <span class="nav-icon">🧮</span><span>薪资试算</span>
      </button>
      <button class="nav-item" onclick="showPage('summary')">
        <span class="nav-icon">📊</span><span>月度汇总</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <div class="user-name" id="sidebar-name">—</div>
      <div class="user-info" id="sidebar-email">—</div>
      <button class="btn-logout" onclick="logout()">退出登录</button>
    </div>
  </nav>

  <!-- 内容区 -->
  <div class="main">

    <!-- ─ 工时记录页 ───────────────────────────── -->
    <div id="page-timesheet">
      <div class="page-header">
        <div>
          <div class="page-title">工时<span>记录</span></div>
          <div class="page-sub">记录每日上下班时间与加班情况</div>
        </div>
        <button class="btn btn-accent" onclick="openAddModal()">＋ 添加记录</button>
      </div>

      <div class="month-nav">
        <button onclick="prevMonth()">‹</button>
        <span class="month-display" id="month-display">—</span>
        <button onclick="nextMonth()">›</button>
      </div>

      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-label">工作天数</div><div class="stat-value" id="stat-days">—</div></div>
        <div class="stat-card"><div class="stat-label">总工时</div><div class="stat-value" id="stat-hours">—</div></div>
        <div class="stat-card"><div class="stat-label">加班时长</div><div class="stat-value accent" id="stat-ot">—</div></div>
        <div class="stat-card"><div class="stat-label">平均工时/天</div><div class="stat-value" id="stat-avg">—</div></div>
      </div>

<div class="modal-overlay" id="timesheet-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">添加工时记录</span>
      <button class="modal-close" onclick="closeTimesheetModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-field">
          <label>日期</label>
          <input type="date" id="ts-date">
        </div>
        <div class="form-field">
          <label>项目名称</label>
          <input type="text" id="ts-project" placeholder="可选">
        </div>
      </div>

        <div class="form-field">
          <label>上班时间</label>
          <input type="time" id="ts-checkin" value="09:00">

      <button class="btn btn-ghost" onclick="closeTimesheetModal()">取消</button>
      <button class="btn btn-accent" id="btn-save-ts" onclick="saveTimesheet()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── 配置 ─────────────────────────────────────────────────────
// !! 将下方 API_BASE 替换为你的 Cloudflare Worker 地址 !!
const API_BASE = 'https://your-worker.your-subdomain.workers.dev';

// ─── 状态 ─────────────────────────────────────────────────────
let token = localStorage.getItem('ts_token') || '';
let currentUser = JSON.parse(localStorage.getItem('ts_user') || 'null');
let currentMonth = new Date().toISOString().slice(0, 7);
let timesheets = [];
let editingId = null;

// ─── 工具 ─────────────────────────────────────────────────────
async function api(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function fmt(n) {
  return typeof n === 'number' ? n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// ─── 认证 ─────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('auth-error').textContent = '';
  document.getElementById('reg-error').textContent = '';
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const data = await api('/auth/login', { method: 'POST', body: { email, password } });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('ts_token', token);
    localStorage.setItem('ts_user', JSON.stringify(currentUser));
    enterApp();
  } catch (e) {
    document.getElementById('auth-error').textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = '注册中…';
  try {
    const data = await api('/auth/register', { method: 'POST', body: { name, email, password } });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('ts_token', token);
    localStorage.setItem('ts_user', JSON.stringify(currentUser));
    enterApp();
  } catch (e) {
    document.getElementById('reg-error').textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '创建账号';
  }
}

function enterApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('sidebar-name').textContent = currentUser.name;
  document.getElementById('sidebar-email').textContent = currentUser.email;
  // 初始化月份选择器
  document.getElementById('sum-month').value = currentMonth;
  updateMonthDisplay();
  loadTimesheets();
  calcSalary();
  calcSummary();
}

function logout() {
  token = ''; currentUser = null;
  localStorage.removeItem('ts_token');
  localStorage.removeItem('ts_user');
  document.getElementById('auth-page').style.display = '';
  document.getElementById('app').style.display = 'none';
}

// ─── 页面导航 ──────────────────────────────────────────────────
function showPage(name) {
  ['timesheet', 'salary', 'summary'].forEach(p => {
    document.getElementById('page-' + p).style.display = p === name ? '' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', ['timesheet', 'salary', 'summary'][i] === name);
  });
  if (name === 'summary') calcSummary();
}

// ─── 工时记录 ──────────────────────────────────────────────────
function updateMonthDisplay() {
  const [y, m] = currentMonth.split('-');
  document.getElementById('month-display').textContent = `${y}年${m}月`;
}

function prevMonth() {
  const d = new Date(currentMonth + '-01');
  d.setMonth(d.getMonth() - 1);
  currentMonth = d.toISOString().slice(0, 7);
  updateMonthDisplay();
  loadTimesheets();
}

function nextMonth() {
  const d = new Date(currentMonth + '-01');
  d.setMonth(d.getMonth() + 1);
  currentMonth = d.toISOString().slice(0, 7);
  updateMonthDisplay();
  loadTimesheets();
}

async function loadTimesheets() {
  const tbody = document.getElementById('timesheet-table-body');
  tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>';
  try {
    timesheets = await api(`/timesheets?month=${currentMonth}`);
    renderTimesheets();
  } catch (e) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">加载失败：${e.message}</td></tr>`;
  }
}

function renderTimesheets() {
  const tbody = document.getElementById('timesheet-table-body');
  if (!timesheets.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">本月暂无记录 · 点击右上角添加</td></tr>';
    updateStats([]);
    return;
  }
  tbody.innerHTML = timesheets.map(r => {
    const totalH = (r.totalMinutes / 60).toFixed(1);
    const otBadge = r.overtimeHours > 0
      ? `<span class="badge badge-orange">+${r.overtimeHours}h</span>`
      : '<span class="badge badge-gray">—</span>';
    return `
    <tr>
      <td class="date-col">${r.date}</td>
      <td class="time-col">${r.checkIn}</td>
      <td class="time-col">${r.checkOut}</td>
      <td class="hours-col">${totalH}h</td>
      <td>${otBadge}</td>
      <td><span style="color:var(--ink2)">${r.projectName || '—'}</span></td>
      <td style="color:var(--ink3);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.notes || ''}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${r.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}')">删除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  updateStats(timesheets);
}

function updateStats(records) {
  const days = records.length;
  const totalH = records.reduce((s, r) => s + r.totalMinutes / 60, 0);
  const otH = records.reduce((s, r) => s + (r.overtimeHours || 0), 0);
  const avgH = days ? totalH / days : 0;
  document.getElementById('stat-days').textContent = days + ' 天';
  document.getElementById('stat-hours').textContent = totalH.toFixed(1) + ' h';
  document.getElementById('stat-ot').textContent = otH.toFixed(1) + ' h';
  document.getElementById('stat-avg').textContent = avgH.toFixed(1) + ' h';
}

// ─── 模态框 ────────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '添加工时记录';
  document.getElementById('edit-id').value = '';
  document.getElementById('ts-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('ts-checkin').value = '09:00';
  document.getElementById('ts-checkout').value = '18:00';
  document.getElementById('ts-project').value = '';
  document.getElementById('ts-notes').value = '';
  document.getElementById('modal-error').textContent = '';
  document.getElementById('timesheet-modal').classList.add('open');
}

function openEditModal(id) {
  const r = timesheets.find(t => t.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '编辑工时记录';
  document.getElementById('edit-id').value = id;
  document.getElementById('ts-date').value = r.date;
  document.getElementById('ts-checkin').value = r.checkIn;
  document.getElementById('ts-checkout').value = r.checkOut;
  document.getElementById('ts-project').value = r.projectName || '';
  document.getElementById('ts-notes').value = r.notes || '';
  document.getElementById('modal-error').textContent = '';
  document.getElementById('timesheet-modal').classList.add('open');
}

function closeTimesheetModal() {
  document.getElementById('timesheet-modal').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('timesheet-modal')) closeTimesheetModal();
}

async function saveTimesheet() {
  const body = {
    date: document.getElementById('ts-date').value,
    checkIn: document.getElementById('ts-checkin').value,
    checkOut: document.getElementById('ts-checkout').value,
    projectName: document.getElementById('ts-project').value,
    notes: document.getElementById('ts-notes').value,
  };
  if (!body.date || !body.checkIn || !body.checkOut) {
    document.getElementById('modal-error').textContent = '请填写日期和时间';
    return;
  }
  if (body.checkOut <= body.checkIn) {
    document.getElementById('modal-error').textContent = '下班时间必须晚于上班时间';
    return;
  }
  const btn = document.getElementById('btn-save-ts');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    if (editingId) {
      await api(`/timesheets/${editingId}`, { method: 'PUT', body });
    } else {
      await api('/timesheets', { method: 'POST', body });
    }
    closeTimesheetModal();
    await loadTimesheets();
    showToast(editingId ? '已更新' : '已添加', 'success');
  } catch (e) {
    document.getElementById('modal-error').textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '保存';
  }
}

async function deleteRecord(id) {
  if (!confirm('确认删除此条记录？')) return;
  try {
    await api(`/timesheets/${id}`, { method: 'DELETE' });
    await loadTimesheets();
    showToast('已删除');
  } catch (e) {
    showToast('删除失败：' + e.message, 'error');
  }
}

// ─── 薪资试算 ──────────────────────────────────────────────────
let siConfigOpen = false;

function toggleSiConfig() {
  siConfigOpen = !siConfigOpen;
  document.getElementById('si-rates').classList.toggle('open', siConfigOpen);
  document.getElementById('si-toggle-icon').textContent = siConfigOpen ? '▼' : '▶';
  calcSalary();
}

function getSiConfig() {
  return {
    pension:      parseFloat(document.getElementById('si-pension').value) / 100,
    medical:      parseFloat(document.getElementById('si-medical').value) / 100,
    unemployment: parseFloat(document.getElementById('si-unemployment').value) / 100,
    housingFund:  parseFloat(document.getElementById('si-housing').value) / 100,
  };
}

function addDeduction() {
  const container = document.getElementById('custom-deductions');
  const div = document.createElement('div');
  div.className = 'deduction-item';
  div.innerHTML = `
    <input type="text" placeholder="名称" style="flex:1">
    <input type="number" placeholder="金额" style="flex:0 0 120px" oninput="calcSalary()">
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove();calcSalary()">✕</button>
  `;
  container.appendChild(div);
}

function getCustomDeductions() {
  return Array.from(document.querySelectorAll('#custom-deductions .deduction-item')).map(el => ({
    name: el.children[0].value || '自定义扣款',
    amount: parseFloat(el.children[1].value) || 0,
  })).filter(d => d.amount > 0);
}

async function calcSalary() {
  const baseSalary = parseFloat(document.getElementById('s-base').value) || 0;
  if (!baseSalary) return;

  const params = {
    baseSalary,
    bonus: parseFloat(document.getElementById('s-bonus').value) || 0,
    overtimeHours: parseFloat(document.getElementById('s-ot-hours').value) || 0,
    overtimeRate: parseFloat(document.getElementById('s-ot-rate').value) || 1.5,
    siConfig: getSiConfig(),
    customDeductions: getCustomDeductions(),
  };

  // 更新社保汇总文字
  const si = getSiConfig();
  const totalSiRate = ((si.pension + si.medical + si.unemployment + si.housingFund) * 100).toFixed(1);
  document.getElementById('si-total-rate').textContent = totalSiRate + '%';

  try {
    const res = await api('/salary/calculate', { method: 'POST', body: params });
    renderSalaryResult(res, 'salary-breakdown', 'res-net');
  } catch (e) {
    // 本地计算兜底
    renderLocalSalary(params);
  }
}

function renderSalaryResult(res, containerId, netId) {
  document.getElementById(netId).textContent = fmt(res.netSalary);

  const si = res.socialInsurance;
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <div class="breakdown-section"><span>收入</span><span></span></div>
    <div class="breakdown-row"><span class="breakdown-label">基本月薪</span><span class="breakdown-value gross">¥${fmt(res.baseSalary)}</span></div>
    ${res.overtimePay > 0 ? `<div class="breakdown-row"><span class="breakdown-label">加班工资</span><span class="breakdown-value gross">¥${fmt(res.overtimePay)}</span></div>` : ''}
    ${res.bonus > 0 ? `<div class="breakdown-row"><span class="breakdown-label">奖金</span><span class="breakdown-value gross">¥${fmt(res.bonus)}</span></div>` : ''}
    <div class="breakdown-row"><span class="breakdown-label">税前总收入</span><span class="breakdown-value gross">¥${fmt(res.grossSalary)}</span></div>
    <div class="breakdown-section"><span>社保 & 公积金</span><span class="deduct">-¥${fmt(si.total)}</span></div>
    <div class="breakdown-row"><span class="breakdown-label">养老保险（${(si.rates.pension*100).toFixed(1)}%）</span><span class="breakdown-value deduct">-¥${fmt(si.pension)}</span></div>
    <div class="breakdown-row"><span class="breakdown-label">医疗保险（${(si.rates.medical*100).toFixed(1)}%）</span><span class="breakdown-value deduct">-¥${fmt(si.medical)}</span></div>
    <div class="breakdown-row"><span class="breakdown-label">失业保险（${(si.rates.unemployment*100).toFixed(1)}%）</span><span class="breakdown-value deduct">-¥${fmt(si.unemployment)}</span></div>
    <div class="breakdown-row"><span class="breakdown-label">住房公积金（${(si.rates.housingFund*100).toFixed(1)}%）</span><span class="breakdown-value deduct">-¥${fmt(si.housingFund)}</span></div>
    ${res.customDeductions.length ? `<div class="breakdown-section"><span>自定义扣款</span><span></span></div>${res.customDeductions.map(d => `<div class="breakdown-row"><span class="breakdown-label">${d.name}</span><span class="breakdown-value deduct">-¥${fmt(d.amount)}</span></div>`).join('')}` : ''}
    <div class="breakdown-section"><span>个人所得税</span><span class="deduct">-¥${fmt(res.iit)}</span></div>
    <div class="breakdown-row"><span class="breakdown-label">应纳税所得额</span><span class="breakdown-value">¥${fmt(res.taxableIncome)}</span></div>
    <div class="breakdown-row"><span class="breakdown-label">预扣个税</span><span class="breakdown-value deduct">-¥${fmt(res.iit)}</span></div>
    <div class="breakdown-section"><span>合计扣除</span><span class="deduct">-¥${fmt(res.totalDeductions)}</span></div>
    <div class="breakdown-row" style="font-weight:500"><span class="breakdown-label">预计到手</span><span class="breakdown-value" style="color:var(--green);font-size:15px">¥${fmt(res.netSalary)}</span></div>
  `;
}

// 月度汇总
async function calcSummary() {
  const month = document.getElementById('sum-month').value;
  const baseSalary = parseFloat(document.getElementById('sum-base').value) || 0;
  if (!month || !baseSalary) return;

  try {
    const res = await api('/salary/monthly-summary', {
      method: 'POST',
      body: {
        month,
        baseSalary,
        overtimeRate: parseFloat(document.getElementById('sum-ot-rate').value),
        siConfig: {},
        customDeductions: [],
      }
    });
    document.getElementById('sum-days').textContent = res.totalWorkDays + ' 天';
    document.getElementById('sum-regular').textContent = (res.totalWorkDays * 8).toFixed(0) + ' h';
    document.getElementById('sum-ot').textContent = res.totalOvertimeHours + ' h';
    document.getElementById('summary-salary-card').style.display = '';
    renderSalaryResult(res, 'summary-breakdown', 'sum-net');
  } catch (e) {
    showToast('汇总计算失败：' + e.message, 'error');
  }
}

// ─── 初始化 ────────────────────────────────────────────────────
window.onload = () => {
  // 回车登录
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  // 初始化日期
  document.getElementById('ts-date').value = new Date().toISOString().slice(0, 10);

  if (token && currentUser) {
    enterApp();
  }
};
</script>
